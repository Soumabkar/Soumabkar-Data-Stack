services:

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: abdoul1201
      MINIO_DOMAIN: minio
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - datalake-network

  metastore-db:
    image: postgres:15
    container_name: metastore-db
    hostname: metastore-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: abdoul1201
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datalake-network

  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile-hive
    container_name: hive-metastore
    hostname: hive-metastore
    depends_on:
      metastore-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SKIP_SCHEMA_INIT: "false"    # ← forcer l'init du schéma
    volumes:
      - ./hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat /dev/null > /dev/tcp/localhost/9083'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s
    networks:
      - datalake-network

  trino:
    image: trinodb/trino:466
    container_name: trino
    hostname: trino
    depends_on:
      hive-metastore:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./trino-config:/etc/trino:ro
      #- trino-data:/data/trino
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - datalake-network

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile-airflow
    container_name: airflow
    hostname: airflow
    depends_on:
      trino:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://hive:hive@metastore-db:5432/airflow
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-data:/opt/airflow
      - /home/soumabkar/Soumabkar-Data-Stack:/opt/project
      - /home/soumabkar/dbt:/opt/dbt
      - /home/soumabkar/.dbt:/home/airflow/.dbt
    networks:
      - datalake-network
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
                 --firstname Abdoul --lastname SOUMAHORO --role Admin --email ab@one.com || true &&
               airflow standalone"
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:
  airflow-data:
 # trino-data:

networks:
  datalake-network:
    driver: bridge
    name: datalake-network